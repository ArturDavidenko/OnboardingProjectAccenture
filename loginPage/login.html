<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie rental - Login</title>
  <link href="https://fonts.googleapis.com/css?family=Inter" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="page-wrapper">
    <h1 class="site-title">Movie rental</h1>

    <section class="login-page">
      <div class="auth-box">
        <label class="auth-label" for="login-email">Email</label>
        <input class="auth-input" id="login-email" type="email" placeholder="email" />

        <label class="auth-label" for="login-password">Password</label>
        <input class="auth-input" id="login-password" type="password" placeholder="password" />

        <div class="auth-action">
          <a class="dark-link-btn auth-btn" href="../homePage/home.html">Sign in</a>
        </div>
      </div>

      <div class="auth-box">
        <label class="auth-label" for="reg-name">Name</label>
        <input class="auth-input" id="reg-name" type="text" placeholder="name" />

        <label class="auth-label" for="reg-surname">Surname</label>
        <input class="auth-input" id="reg-surname" type="text" placeholder="surname" />

        <label class="auth-label" for="reg-email">Email</label>
        <input class="auth-input" id="reg-email" type="email" placeholder="email" />

        <label class="auth-label" for="reg-email-again">Email again</label>
        <input class="auth-input" id="reg-email-again" type="email" placeholder="email" />

        <label class="auth-label" for="reg-password">Password</label>
        <input class="auth-input" id="reg-password" type="password" placeholder="password" />

        <label class="auth-label" for="reg-password-again">Password again</label>
        <input class="auth-input" id="reg-password-again" type="password" placeholder="password" />

        <div class="auth-action">
          <a class="dark-link-btn auth-btn" href="../homePage/home.html">Register</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <p>Made by: Arturs Davidenko</p>
      <p>2026</p>
    </div>
  </footer>
</body>
</html>
