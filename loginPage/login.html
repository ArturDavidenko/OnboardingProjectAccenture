<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie rental - Login</title>

  <link href="https://fonts.googleapis.com/css?family=Inter" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="page-wrapper">
    <h1 class="site-title">Movie rental</h1>

    <section class="login-page">
      <div class="auth-box">
        <form id="loginForm" novalidate>
          <label class="auth-label" for="login-email">Email</label>
          <input
            class="auth-input"
            id="login-email"
            type="text"
            placeholder="email"
          />

          <label class="auth-label" for="login-password">Password</label>
          <input
            class="auth-input"
            id="login-password"
            type="password"
            placeholder="password"
          />

          <p id="loginError" class="form-error"></p>

          <div class="auth-action">
            <button class="dark-btn auth-btn" type="submit">Sign in</button>
          </div>
        </form>
      </div>

      <div class="register-action" id="registerAction">
        <button id="showRegisterBtn" class="dark-btn register-btn" type="button">
          Register
        </button>
      </div>

      <div class="auth-box hidden" id="registerBox">
        <form id="registerForm" novalidate>
          <label class="auth-label" for="reg-name">Name</label>
          <input
            class="auth-input"
            id="reg-name"
            type="text"
            placeholder="name"
          />

          <label class="auth-label" for="reg-surname">Surname</label>
          <input
            class="auth-input"
            id="reg-surname"
            type="text"
            placeholder="surname"
          />

          <label class="auth-label" for="reg-email">Email</label>
          <input
            class="auth-input"
            id="reg-email"
            type="text"
            placeholder="email"
          />

          <label class="auth-label" for="reg-email-again">Email again</label>
          <input
            class="auth-input"
            id="reg-email-again"
            type="text"
            placeholder="email"
          />

          <label class="auth-label" for="reg-password">Password</label>
          <input
            class="auth-input"
            id="reg-password"
            type="password"
            placeholder="password"
          />

          <label class="auth-label" for="reg-password-again">Password again</label>
          <input
            class="auth-input"
            id="reg-password-again"
            type="password"
            placeholder="password"
          />

          <p id="registerError" class="form-error"></p>

          <div class="auth-action">
            <button class="dark-btn auth-btn" type="submit">Register</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <p>Made by: Arturs Davidenko</p>
      <p>2026</p>
    </div>
  </footer>

  <script src="login.js"></script>
</body>
</html>
